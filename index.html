<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SmileSchool</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="site-header">
    <div class="container">
      <div class="logo">😊 SmileSchool</div>
      <nav class="nav-links">
        <a href="#">Courses</a>
        <a href="#">Pricing</a>
        <a href="#">Login</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="hero-content">
      <h1>Get schooled</h1>
      <div class="subtitle">
        <span>SMILES</span>
        <span>GRIN</span>
        <span>LAUGH</span>
      </div>
      <button class="cta">REGISTER FOR FREE</button>
      <p class="tagline"><span class="highlight">Learn</span> from the pros</p>

      <div class="profiles">
        <div class="profile">
          <img src="images/profile1.png" alt="Philip Massey">
          <h3>Philip Massey</h3>
          <p><em>Smile of the year</em> <br> 2018 - 2019</p>
        </div>
        <div class="profile">
          <img src="images/profile2.png" alt="Nannie Lawrence">
          <h3>Nannie Lawrence</h3>
          <p><em>Best little smile</em> <br> 2017</p>
        </div>
        <div class="profile">
          <img src="images/profile3.png" alt="Bruce Walters">
          <h3>Bruce Walters</h3>
          <p><em>Best “Friend Smile”</em> <br> 2019</p>
        </div>
        <div class="profile">
          <img src="images/profile4.png" alt="Henry Hughes">
          <h3>Henry Hughes</h3>
          <p><em>24h smiles winner</em> <br> 2016 - 2019</p>
        </div>
      </div>
    </div>
  </section>

</body>
</html>
